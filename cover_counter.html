<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>가림 카운터</title>

<!-- 홈 화면 추가(PWA): Safari 주소창 없이 전체화면 실행 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="가림카운터" />
<meta name="theme-color" content="#0d0f13" />
<style>
  :root{
    --bg:#0d0f13; --panel:#161a21; --line:#262c36;
    --text:#e9e7e1; --muted:#8b93a1;
    --accent:#f5a623; --good:#4ec97a; --dark:#5b8cff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
  body{display:flex;flex-direction:column;overflow:hidden;}

  #stage{position:relative;flex:1;min-height:0;background:#000;overflow:hidden;}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.6);}
  #scrim{position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,#0000 30%,#000a);}

  /* 큰 카운트 */
  #count{position:absolute;z-index:3;left:50%;top:42%;transform:translate(-50%,-50%);
    font-size:128px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;
    text-shadow:0 4px 24px #000c;}
  #count.flash{animation:pop .25s ease;}
  @keyframes pop{0%{transform:translate(-50%,-50%) scale(1)}40%{transform:translate(-50%,-50%) scale(1.16)}100%{transform:translate(-50%,-50%) scale(1)}}
  #state{position:absolute;z-index:3;left:50%;top:42%;transform:translate(-50%,68px);
    font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
  #state.covered{color:var(--accent);}

  /* 화면유지 상태 표시 */
  #lock{position:absolute;z-index:3;right:14px;top:calc(12px + env(safe-area-inset-top));
    font-size:11px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;
    display:flex;align-items:center;gap:6px;}
  #lock .dot{width:8px;height:8px;border-radius:50%;background:#555;}
  #lock.on .dot{background:var(--good);box-shadow:0 0 8px var(--good);}

  /* 오늘 누적 기록 */
  #today{position:absolute;z-index:3;left:14px;top:calc(12px + env(safe-area-inset-top));
    font-size:11px;letter-spacing:.06em;color:var(--muted);cursor:pointer;}
  #today b{color:var(--text);font-variant-numeric:tabular-nums;}

  /* 기록 패널 */
  #history{position:absolute;inset:0;z-index:10;background:#000c;display:none;
    justify-content:center;align-items:center;padding:24px;}
  #history.show{display:flex;}
  .hist-card{width:100%;max-width:360px;max-height:80%;display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;}
  .hist-head{display:flex;justify-content:space-between;align-items:center;
    padding:16px 16px 12px;font-size:16px;font-weight:700;}
  .hist-head .btn{flex:none;padding:8px 16px;}
  .hist-streak{padding:0 16px 12px;color:var(--muted);font-size:13px;}
  .hist-streak b{color:var(--accent);font-size:18px;font-variant-numeric:tabular-nums;}
  #histList{overflow-y:auto;border-top:1px solid var(--line);}
  .hist-row{display:flex;justify-content:space-between;padding:12px 16px;
    border-bottom:1px solid var(--line);font-size:14px;}
  .hist-row .d{color:var(--muted);}
  .hist-row .v{font-variant-numeric:tabular-nums;}
  .hist-row.today{background:#f5a62311;}
  .hist-empty{padding:24px 16px;text-align:center;color:var(--muted);font-size:13px;}

  /* 밝기 막대 */
  #meter{position:absolute;z-index:3;left:16px;right:16px;bottom:14px;height:46px;
    background:#0008;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  #fill{position:absolute;left:0;top:0;bottom:0;width:60%;
    background:linear-gradient(90deg,#2a3340,#46566c);transition:width .05s linear;}
  #thresh{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);left:50%;}
  #meterlbl{position:absolute;left:10px;top:50%;transform:translateY(-50%);
    font-size:11px;letter-spacing:.16em;color:#cfd6e0;text-transform:uppercase;mix-blend-mode:difference;}

  /* 컨트롤 */
  #controls{z-index:4;display:flex;flex-direction:column;gap:12px;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:var(--panel);border-top:1px solid var(--line);}
  .row{display:flex;align-items:center;gap:12px;}
  .row label{font-size:13px;color:var(--muted);min-width:64px;}
  input[type=range]{flex:1;accent-color:var(--accent);}
  .btns{display:flex;gap:10px;}
  .btn{flex:1;padding:13px 0;border-radius:12px;border:1px solid var(--line);
    background:var(--bg);color:var(--text);font-size:14px;font-weight:600;}
  .btn.reset{color:var(--muted);}
  .btn.stop{color:#e2574c;border-color:#5a2d2a;}
  .step{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);
    background:var(--bg);color:var(--text);font-size:20px;font-weight:700;line-height:1;}
  #goal-val{min-width:64px;text-align:center;font-variant-numeric:tabular-nums;
    color:var(--text);font-size:15px;}
  #sens-val{min-width:40px;text-align:right;font-variant-numeric:tabular-nums;color:var(--text);font-size:13px;}

  /* 시작 게이트 */
  #gate{position:absolute;inset:0;z-index:9;background:var(--bg);
    display:flex;flex-direction:column;justify-content:center;align-items:center;
    gap:18px;padding:28px;text-align:center;}
  #gate h1{margin:0;font-size:22px;}
  #gate p{margin:0;max-width:330px;color:var(--muted);font-size:14px;line-height:1.6;}
  #start{margin-top:6px;padding:16px 40px;font-size:17px;font-weight:700;border:none;
    border-radius:14px;background:var(--accent);color:#1a1206;}
  #err{color:#e2574c;font-size:13px;min-height:18px;}
</style>
</head>
<body>
  <div id="stage">
    <video id="video" playsinline muted></video>
    <div id="scrim"></div>

    <div id="count">0</div>
    <div id="state">대기</div>
    <div id="lock"><span class="dot"></span><span id="lockTxt">화면유지 꺼짐</span></div>
    <div id="today">오늘 <b id="todayReps">0</b>회 · <b id="todaySets">0</b>세트 <span style="color:var(--accent)">기록 ›</span></div>

    <!-- 기록 패널 -->
    <div id="history">
      <div class="hist-card">
        <div class="hist-head"><span>운동 기록</span><button class="btn" id="histClose">닫기</button></div>
        <div class="hist-streak">연속 <b id="streakNum">0</b>일</div>
        <div id="histList"></div>
      </div>
    </div>

    <div id="meter">
      <div id="fill"></div>
      <div id="thresh"></div>
      <div id="meterlbl">밝기</div>
    </div>

    <div id="gate">
      <h1>가림 카운터</h1>
      <p>폰을 <b>화면이 위로</b> 향하게 바닥에 두고, 그 위에서 스쿼트나 푸쉬업을 하세요.
         몸이 카메라를 가려 어두워지면 1회로 셉니다.
         밝게/어둡게 바뀌는 정도에 맞춰 아래 <b>민감도</b>를 조절하세요.</p>
      <button id="start">카메라 시작</button>
      <div id="err"></div>
    </div>
  </div>

  <div id="controls">
    <div class="row">
      <label>민감도</label>
      <input type="range" id="sens" min="5" max="60" value="25" />
      <span id="sens-val">25%</span>
    </div>
    <div class="row">
      <label>목표</label>
      <button class="step" id="goalDown">−</button>
      <span id="goal-val">20회</span>
      <button class="step" id="goalUp">+</button>
      <span style="flex:1"></span>
    </div>
    <div class="btns">
      <button class="btn" id="flip">전/후면</button>
      <button class="btn reset" id="reset">리셋</button>
      <button class="btn stop" id="stop">종료</button>
    </div>
  </div>

<script>
  const video   = document.getElementById("video");
  const countEl = document.getElementById("count");
  const stateEl = document.getElementById("state");
  const fillEl  = document.getElementById("fill");
  const threshEl= document.getElementById("thresh");
  const sens    = document.getElementById("sens");
  const sensVal = document.getElementById("sens-val");
  const gate    = document.getElementById("gate");
  const errEl   = document.getElementById("err");
  const lockEl  = document.getElementById("lock");
  const lockTxt = document.getElementById("lockTxt");
  const todayRepsEl = document.getElementById("todayReps");
  const todaySetsEl = document.getElementById("todaySets");
  const goalVal = document.getElementById("goal-val");
  const todayEl = document.getElementById("today");
  const historyEl = document.getElementById("history");
  const histList = document.getElementById("histList");
  const streakNum = document.getElementById("streakNum");

  // 밝기 샘플링용 작은 캔버스
  const c = document.createElement("canvas");
  c.width = 64; c.height = 48;
  const cx = c.getContext("2d", { willReadFrequently: true });

  let facing = "user";
  let baseline = null;      // 평소(밝은) 밝기, 천천히 학습
  let count = 0;
  let isCovered = false;
  let sensitivity = 0.25;   // 베이스라인 대비 이만큼 어두워지면 '가림'
  let running = false;
  let goal = 20;            // 목표 횟수(0이면 목표 없음)
  let pendingReset = false; // 목표 달성 후 다음 회차에서 카운트 0부터 새 세트

  // ---- 운동 기록: 날짜별 영구 저장 (기기 localStorage) ----
  const STORE_KEY = "coverCounterV2";
  function keyOf(d){
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function todayKey(){ return keyOf(new Date()); }

  function loadStore(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(raw){ const o = JSON.parse(raw); if(o && o.days) return o; }
      // 구버전(하루치) 데이터가 있으면 이전
      const old = localStorage.getItem("coverCounter");
      if(old){ const o = JSON.parse(old);
        if(o && o.date) return { days: { [o.date]: { reps:o.reps||0, sets:o.sets||0 } } }; }
    }catch(e){}
    return { days:{} };
  }
  let store = loadStore();
  function saveStore(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(store)); }catch(e){} }

  function today(){
    const k = todayKey();
    if(!store.days[k]) store.days[k] = { reps:0, sets:0 };
    return store.days[k];
  }
  let log = today();                 // 오늘 기록 객체 참조
  function rollDate(){ log = today(); } // 자정 넘기면 오늘 객체로 갱신
  function renderToday(){ todayRepsEl.textContent = log.reps; todaySetsEl.textContent = log.sets; }
  renderToday();

  // 연속 운동 일수
  function calcStreak(){
    let s = 0; const d = new Date();
    if(!(store.days[todayKey()] && store.days[todayKey()].reps > 0)) d.setDate(d.getDate()-1); // 오늘 아직 0이면 어제부터
    while(true){
      const day = store.days[keyOf(d)];
      if(day && day.reps > 0){ s++; d.setDate(d.getDate()-1); } else break;
    }
    return s;
  }

  // 기록 패널 렌더 + 열고 닫기
  function openHistory(){
    streakNum.textContent = calcStreak();
    const keys = Object.keys(store.days).filter(k=>store.days[k].reps>0).sort().reverse();
    if(!keys.length){
      histList.innerHTML = '<div class="hist-empty">아직 기록이 없어요.</div>';
    } else {
      const tk = todayKey();
      histList.innerHTML = keys.map(k=>{
        const v = store.days[k];
        const cls = k === tk ? "hist-row today" : "hist-row";
        const label = k === tk ? "오늘" : k.slice(5).replace("-","/");
        return `<div class="${cls}"><span class="d">${label}</span><span class="v">${v.reps}회 · ${v.sets}세트</span></div>`;
      }).join("");
    }
    historyEl.classList.add("show");
  }
  todayEl.addEventListener("click", openHistory);
  document.getElementById("histClose").addEventListener("click", ()=>historyEl.classList.remove("show"));
  historyEl.addEventListener("click", (e)=>{ if(e.target === historyEl) historyEl.classList.remove("show"); });

  function renderGoal(){ goalVal.textContent = goal > 0 ? goal + "회" : "없음"; }
  renderGoal();

  // ---- 오디오 ----
  let audioCtx = null;
  async function ensureAudio(){
    // iOS Safari: AudioContext는 suspended로 시작 → 사용자 제스처에서 resume 필수
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      if(audioCtx.state === "suspended") await audioCtx.resume();
    }catch(e){}
  }
  function beep(freq, dur=0.1){
    try{
      if(!audioCtx) return;
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type="square"; o.frequency.value=freq;
      g.gain.setValueAtTime(0.2, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  // 목표 달성 축하 멜로디 (도-미-솔-도)
  function playMelody(){
    try{
      if(!audioCtx) return;
      const notes=[523,659,784,1047], t0=audioCtx.currentTime;
      notes.forEach((f,i)=>{
        const o=audioCtx.createOscillator(), g=audioCtx.createGain(), t=t0+i*0.15;
        o.type="square"; o.frequency.value=f;
        g.gain.setValueAtTime(0.001,t);
        g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.17);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t+0.2);
      });
    }catch(e){}
  }

  // ---- 화면 자동잠금 방지 (Wake Lock) ----
  let wakeLock = null;
  async function requestWakeLock(){
    try{
      if("wakeLock" in navigator){
        wakeLock = await navigator.wakeLock.request("screen");
        wakeLock.addEventListener("release", ()=>{
          lockEl.classList.remove("on"); lockTxt.textContent = "화면유지 꺼짐";
        });
        lockEl.classList.add("on"); lockTxt.textContent = "화면유지 켜짐";
      }else{
        lockTxt.textContent = "화면유지 미지원";
      }
    }catch(e){
      lockEl.classList.remove("on");
      lockTxt.textContent = "화면유지 실패";
    }
  }
  // 화면이 잠겼다 돌아오면(앱 전환/알림 등) wake lock과 영상 재개
  document.addEventListener("visibilitychange", async ()=>{
    if(document.visibilityState === "visible" && running){
      if(wakeLock === null || wakeLock.released) await requestWakeLock();
      try{ if(video.paused) await video.play(); }catch(e){}
    }
  });

  function avgBrightness(){
    cx.drawImage(video, 0, 0, c.width, c.height);
    const d = cx.getImageData(0,0,c.width,c.height).data;
    let sum = 0;
    for(let i=0;i<d.length;i+=4){
      sum += 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2]; // 휘도
    }
    return sum / (d.length/4) / 255; // 0~1
  }

  function loop(){
    if(!running) return;            // 종료 시 루프 중단
    if(video.readyState >= 2){
      const b = avgBrightness();

      // 베이스라인: 현재가 더 밝으면 빠르게, 어두우면 아주 천천히 따라감(가림 중엔 거의 고정)
      if(baseline === null) baseline = b;
      else if(b > baseline) baseline += (b - baseline) * 0.05;
      else baseline += (b - baseline) * 0.002;

      const downThresh = baseline * (1 - sensitivity);   // 이보다 어두우면 가림
      const upThresh   = baseline * (1 - sensitivity*0.5); // 다시 이보다 밝아야 해제(떨림 방지)

      // 상태 머신: 내려가서 가려지는 '순간' 카운트+소리
      if(!isCovered && b < downThresh){
        isCovered = true;
        stateEl.classList.add("covered");
        rollDate();
        if(pendingReset){ count = 0; pendingReset = false; } // 목표 달성 후 새 세트 시작
        count++; countEl.textContent = count;
        countEl.classList.remove("flash"); void countEl.offsetWidth; countEl.classList.add("flash");
        log.reps++;

        if(goal > 0 && count >= goal){     // 목표 달성
          playMelody();
          log.sets++;
          pendingReset = true;
          stateEl.textContent = "세트 완료!";
        } else {
          beep(2000);
          stateEl.textContent = "가림";
        }
        saveStore(); renderToday();
      } else if(isCovered && b > upThresh){
        isCovered = false;
        stateEl.textContent = "대기"; stateEl.classList.remove("covered");
      }

      // 시각화: 막대는 현재 밝기, 세로선은 임계값 위치(베이스라인 대비 비율)
      fillEl.style.width = Math.round(b*100) + "%";
      fillEl.style.background = isCovered
        ? "linear-gradient(90deg,#3a2a12,#f5a623)"
        : "linear-gradient(90deg,#2a3340,#46566c)";
      threshEl.style.left = Math.round(downThresh*100) + "%";
    }
    requestAnimationFrame(loop);
  }

  async function startCamera(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode: facing }, audio:false });
      video.srcObject = stream;
      await video.play();
      baseline = null; // 새 카메라면 베이스라인 다시 학습
    }catch(e){
      errEl.textContent = "카메라 접근 실패: " + e.message + " (https 또는 localhost에서 열어주세요)";
      throw e;
    }
  }

  document.getElementById("start").addEventListener("click", async ()=>{
    errEl.textContent = "";
    try{
      await ensureAudio();   // iOS 오디오 활성화
      beep(1500);
      await startCamera();
      await requestWakeLock(); // 화면 자동잠금 방지
      running = true;
      gate.style.display = "none";
      loop();
    }catch(e){}
  });

  sens.addEventListener("input", ()=>{
    sensitivity = sens.value/100;
    sensVal.textContent = sens.value + "%";
  });

  document.getElementById("flip").addEventListener("click", async ()=>{
    facing = facing === "user" ? "environment" : "user";
    if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); await startCamera(); }
  });

  document.getElementById("reset").addEventListener("click", ()=>{
    count = 0; isCovered = false; pendingReset = false; countEl.textContent = "0";
    stateEl.textContent = "대기"; stateEl.classList.remove("covered");
    beep(1200);
  });

  // 목표 조절 (0 = 없음, 5씩, 최대 100)
  document.getElementById("goalUp").addEventListener("click", ()=>{
    goal = Math.min(100, goal + 5); renderGoal();
  });
  document.getElementById("goalDown").addEventListener("click", ()=>{
    goal = Math.max(0, goal - 5); renderGoal();
  });

  // 종료: 카메라·화면유지 해제하고 시작 화면으로
  document.getElementById("stop").addEventListener("click", async ()=>{
    running = false;                                   // 루프 중단
    beep(900);
    if(video.srcObject){ video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject = null; }
    try{ if(wakeLock){ await wakeLock.release(); wakeLock = null; } }catch(e){}
    baseline = null; isCovered = false;
    stateEl.textContent = "대기"; stateEl.classList.remove("covered");
    gate.style.display = "flex";                       // 시작 화면 복귀(횟수는 유지)
  });
</script>
</body>
</html>
